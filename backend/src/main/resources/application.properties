# ─── PostgreSQL datasource ────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/findspace}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── HikariCP connection pool (sized for free-tier hosts) ─────────────────────
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:6a6829f75d23e8c281b9fa6470c3b33d5e835617b7e8c98b948dfef1ce3fe59c}
jwt.expirationMs=86400000

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── CORS (set to your Vercel URL in production) ──────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.findspace=INFO
logging.level.org.springframework.security=WARN
